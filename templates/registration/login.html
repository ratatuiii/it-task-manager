{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login{% endblock %}

{% block header_title %}Login{% endblock %}

{% block content %}
    <div class="login-wrapper">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-dark w-100">Login</button>
        </form>
    </div>
{% endblock %}

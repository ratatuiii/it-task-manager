<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Manager{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'task_manager/css/styles.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">Task Manager</div>
            <nav class="sidebar-nav">
                <a href="/">Home</a>
                <hr class="nav-divider">
                <a href="{% url 'task_manager:task-list' %}">Tasks</a>
                <hr class="nav-divider">
                <a href="{% url 'task_manager:worker-list' %}">People</a>
                <hr class="nav-divider">
                <a href="{% url 'task_manager:position-list' %}">Positions</a>
                <hr class="nav-divider">
                <a href="{% url 'task_manager:tasktype-list' %}">Task Types</a>
            </nav>
        </aside>

        <!-- Main area -->
        <div class="main">

            <!-- Header -->
            <header class="header">
                <div class="header-title">{% block header_title %}{% endblock %}</div>
                <div class="header-actions">
                    {% if user.is_authenticated %}
                        <a href="{% url 'task_manager:worker-detail' pk=user.pk %}">Profile</a>
                        <form method="post" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit">Logout</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}">Login</a>
                        <a href="{% url 'task_manager:register' %}">Register</a>
                    {% endif %}
                </div>
            </header>

            <!-- Page content -->
            <main class="content">
                {% block content %}{% endblock %}
            </main>

        </div>
    </div>

</body>
</html>

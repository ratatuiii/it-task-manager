databases:
  - name: it-task-manager-db
    plan: free
    databaseName: it_task_manager
    user: it_task_manager

services:
  - type: web
    plan: free
    name: it-task-manager
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: it-task-manager-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
